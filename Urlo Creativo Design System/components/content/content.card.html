<!doctype html>
<html>
<head>
<meta charset="utf8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--uc-paper); font-family: var(--font-sans); }
  .wrap { padding: 28px 32px; display: flex; flex-direction: column; gap: 30px; }
  .label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--uc-gray-400); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 220px 1fr; gap: 40px; align-items: start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ProcessBar, ProjectCard, ServiceRow, ServiceItem, TeamMember } = window.UrloCreativoDesignSystem_098823;
  function Demo() {
    return (
      <>
        <div>
          <div className="label">Process bar</div>
          <ProcessBar />
        </div>
        <div className="grid">
          <div>
            <div className="label">Project card</div>
            <ProjectCard image="../../assets/project-colmar.png" title="Colmar Sport" year="2026" href="#" />
          </div>
          <div>
            <div className="label">Service rows</div>
            <ServiceRow number={1} title="Brand identity & communication" defaultOpen>
              <ServiceItem label="Brand strategy" />
              <ServiceItem label="Visual identity" />
              <ServiceItem label="Communication" />
            </ServiceRow>
            <ServiceRow number={2} title="Design & product development" />
            <div className="label" style={{ marginTop: 28 }}>Team member</div>
            <div style={{ width: 200 }}>
              <TeamMember photo="../../assets/people-team.jpg" name="Giulia" role="Founder — Designer, Project Manager" />
            </div>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
