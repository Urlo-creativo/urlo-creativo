<!doctype html>
<html>
<head>
<meta charset="utf8">
<title>Urlo Creativo — Website</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--uc-paper); }
  #app { position: relative; }
  .nav-fixed {
    position: sticky; top: 18px; z-index: 50;
    margin: 18px 138px 0; 
  }
  ::selection { background: var(--uc-yellow); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../assets/clients/Components.bundle.js"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Projects.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel">
  const UC = window.UrloCreativoDesignSystem_098823;
  const { NavBar } = UC;

  function App() {
    const [page, setPage] = React.useState("Home");
    const go = (label) => { setPage(label); window.scrollTo({ top: 0 }); };

    const Screen = {
      "Home": window.HomeScreen,
      "Projects": window.ProjectsScreen,
      "About Us": window.AboutScreen,
      "Services": window.ServicesScreen,
      "Contact": window.ContactScreen,
    }[page] || window.HomeScreen;

    return (
      <div>
        <div className="nav-fixed">
          <NavBar active={page} basePath="../../" onNavigate={go} />
        </div>
        <div style={{ marginTop: -82 }}>
          <Screen onNavigate={go} />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
