<!-- @dsCard group="Colors" viewport="700x150" name="Ink & paper" subtitle="Near-black ink on warm paper white" -->
<!doctype html><html><head><meta charset="utf8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .n{font-size:11px;font-weight:700;letter-spacing:.04em}
  .h{font-size:10px;opacity:.6;margin-top:2px}
</style></head>
<body><div class="row">
  <div class="sw" style="background:#000;color:#fff"><div class="n">Black</div><div class="h">#000000</div></div>
  <div class="sw" style="background:#0f0f0f;color:#fff"><div class="n">Ink</div><div class="h">#0F0F0F</div></div>
  <div class="sw" style="background:#0c1c2c;color:#fff"><div class="n">Navy</div><div class="h">#0C1C2C</div></div>
  <div class="sw" style="background:#fefdf9;color:#000;box-shadow:inset 0 0 0 1px #eaeaea"><div class="n">Paper</div><div class="h">#FEFDF9</div></div>
  <div class="sw" style="background:#fafafa;color:#000;box-shadow:inset 0 0 0 1px #eaeaea"><div class="n">Panel</div><div class="h">#FAFAFA</div></div>
</div></body></html>
