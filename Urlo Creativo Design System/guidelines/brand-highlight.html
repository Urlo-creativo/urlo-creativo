<!doctype html><html><head><meta charset="utf8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--uc-paper);font-family:var(--font-sans);color:var(--uc-ink)}
.w{padding:26px 32px;display:flex;flex-direction:column;gap:20px}
.h{font-size:34px;font-weight:700;text-transform:uppercase;line-height:1}
.u{background-image:linear-gradient(var(--uc-yellow),var(--uc-yellow));background-repeat:no-repeat;background-position:0 88%;background-size:100% .42em}
.fill{background:var(--uc-yellow);padding:.02em .12em}
.p{font-size:20px;font-weight:700}
.tb{padding:.02em .12em}</style></head>
<body><div class="w">
<div class="h">How we <span class="u">work</span></div>
<div><span class="fill" style="font-size:18px;font-weight:700">WE DEVELOP IDEAS THROUGH WORDS AND IMAGES.</span></div>
<div class="p">We <span class="tb" style="background:var(--uc-blue)">identify</span> the brand and define its <span class="tb" style="background:var(--uc-pink)">personality.</span></div>
</div></body></html>
